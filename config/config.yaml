server:
  port: 8080
  mode: debug

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: hospital_schedule
  sslmode: disable

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: your-jwt-secret-key
  expire: 24h

wechat:
  appid: your-appid
  secret: your-secret
  mch_id: your-mch-id
  api_key: your-api-key
  notify_url: http://your-domain/api/v1/payments/callback

sms:
  provider: tencent          # tencent 或 aliyun
  secret_id: your-secret-id
  secret_key: your-secret-key
  app_id: your-sms-app-id
  sign_name: your-sign-name
  template_id: your-template-id
